<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkB - Verificador</title>
    <link rel="icon" type="image/png" href="png/icon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="main-container">
        <div class="logo-wrapper">
            <img src="png/logo.png" alt="SkB Logo" class="logo-img">
        </div>

        <div class="search-container">
            <input type="text" id="codigoInput" class="search-input" placeholder="Ingresa tu código..." aria-label="Buscar código">
            <button class="search-button" onclick="buscarCodigo()">BUSCAR</button>
        </div>
    </div>

    <script src="js/codigos.js"></script>
    <script src="js/buscador.js"></script>
</body>
</html>
